<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ふぉうりん・らぶ</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="game-shell">
      <header class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Stage: <span id="stage">1</span></div>
        <div>残機: <span id="lives">3</span></div>
      </header>
      <div class="game-view">
        <canvas id="gameCanvas" width="720" height="1280"></canvas>
        <div id="overlay" class="overlay hidden">
          <img id="overlayLogo" class="overlay-logo hidden" src="res/img/logo.png" alt="Game Logo" />
          <h1 id="overlayTitle">Stage 1</h1>
          <p id="overlayMessage">Press Enter to start</p>
          <button id="restartButton">Restart</button>
          <img id="titleCharacter" class="title-character hidden" src="res/img/player_front.png" alt="Player" />
        </div>
        <div id="bossWarning" class="boss-warning hidden">
          <div class="boss-warning-band">
            <svg class="boss-warning-text" viewBox="0 0 720 120" preserveAspectRatio="xMidYMid meet" role="img" aria-label="WARNING">
              <text x="360" y="94" text-anchor="middle" textLength="720" lengthAdjust="spacingAndGlyphs">WARNING</text>
            </svg>
          </div>
        </div>
        <div id="screenTransition" class="screen-transition hidden"></div>
      </div>
    </div>

    <script src="src/stages.js"></script>
    <script src="src/spawnTables.js"></script>
    <script src="src/weapons.js"></script>
    <script src="src/powerups.js"></script>
    <script src="src/portals.js"></script>
    <script src="src/player.js"></script>
    <script src="src/enemy.js"></script>
    <script src="src/game.js"></script>
  </body>
</html>
