<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GKT Shooter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="game-shell">
      <header class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Stage: <span id="stage">1</span></div>
        <div>HP: <span id="hp">100</span></div>
      </header>
      <div class="game-view">
        <canvas id="gameCanvas" width="720" height="1280"></canvas>
        <div id="overlay" class="overlay hidden">
          <img id="overlayLogo" class="overlay-logo hidden" src="../res/img/logo.png" alt="Game Logo" />
          <h1 id="overlayTitle">Stage 1</h1>
          <p id="overlayMessage">Press Enter to start</p>
          <button id="restartButton">Restart</button>
        </div>
        <div id="screenTransition" class="screen-transition hidden"></div>
      </div>
    </div>

    <script src="spawnTables.js"></script>
    <script src="game.js"></script>
  </body>
</html>
